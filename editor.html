<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Editor do Organograma doc24</title><link rel="stylesheet" href="styles.css"></head><body data-mode="editor">
<div class="login" id="login"><div class="login-card"><h2>Área restrita</h2><p>Editor do organograma. Acesso destinado às responsáveis pela atualização.</p><input id="passwordInput" type="password" placeholder="Digite a senha"><button class="btn primary" id="loginBtn">Entrar</button><div class="error" id="loginError"></div></div></div>
<header class="topbar"><div class="brand"><div class="brand-mark">24</div><div><h1>Organograma doc24</h1><small>Modo de edição</small></div></div><div class="tabs" id="tabs"></div><div class="tools"><button class="btn" id="zoomOut">−</button><button class="btn" id="zoomIn">+</button><button class="btn" id="centerBtn">Centralizar</button><button class="btn" id="organizeBtn">Organizar</button><button class="btn" id="namesBtn">Mostrar/ocultar nomes</button><button class="btn primary" id="addRootBtn">+ Criar caixa</button><button class="btn green" id="saveBtn">Baixar data.json</button></div></header>
<div id="viewport"><div id="world"><svg id="links"></svg><div class="country-label"><h2 id="countryTitle"></h2><p id="countryInfo"></p></div><div id="nodes"></div></div></div>
<div class="panel" id="panel" hidden><h3>Editar caixa selecionada</h3><div class="field"><label>Cargo</label><input id="roleInput"></div><div class="field"><label>Nome opcional</label><input id="nameInput"></div><div class="field"><label>Responde para</label><select id="parentSelect"></select></div><div class="field"><label>Área / cor</label><select id="areaSelect"><option value="shared">Compartilhado</option><option value="rh">Capital Humano</option><option value="med">Médico</option><option value="mkt">Marketing</option><option value="ops">Operações</option><option value="ti">Tecnologia</option><option value="com">Comercial</option><option value="fin">Financeiro</option></select></div><div class="row"><button class="btn primary" id="addChildBtn">Adicionar abaixo</button><button class="btn danger" id="deleteBtn">Excluir</button></div><div class="hint">Arraste as caixas livremente. As linhas acompanham em tempo real. O botão <b>Organizar</b> recompõe a árvore com espaçamento uniforme.</div></div>
<script src="app.js"></script></body></html>
